name: CI

on:
  pull_request:
  push:
    branches: [main]

# Typecheck + lint on the same Windows target the release pipeline uses.
# `--ignore-scripts` skips electron-builder's install-app-deps rebuild so CI
# doesn't need the native toolchain — we only need TypeScript to be happy.
jobs:
  checks:
    name: Typecheck & lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        shell: bash
        run: npm install --ignore-scripts
      - name: Typecheck
        shell: bash
        run: npm run typecheck
      - name: Lint
        shell: bash
        run: npm run lint
